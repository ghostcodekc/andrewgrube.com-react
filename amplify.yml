version: 1
env:
  variables:
    NODE_ENV: production
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  redirects:
    - source: '</^[^.]+$|\.(?!webp|png|jpg|jpeg|gif|svg|css|js|json|ico|webmanifest)$/'
      target: /index.html
      status: 200
      queryParameters:
        - ''