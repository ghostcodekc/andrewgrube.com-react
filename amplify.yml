version: 1
env:
  variables:
    NODE_ENV: production
frontend:
  phases:
    preBuild:
      commands:
        - rm -rf node_modules
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  redirects:
    - source: '/<^.+\.[a-zA-Z0-9]{1,}$|^(?!.*\.)/'
      target: /index.html
      status: 200